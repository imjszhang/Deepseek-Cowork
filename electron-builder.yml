appId: com.deepseek.cowork
productName: DeepSeek Cowork
copyright: Copyright © 2026

# 目录配置
directories:
  output: dist
  buildResources: build

# 应用信息
extraMetadata:
  main: electron/main.js

# 文件包含/排除
files:
  - "**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"
  - "!archives/**"
  - "!dist/**"
  - "!build/**"

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: icons/icon.ico
  requestedExecutionLevel: asInvoker
  artifactName: "${productName}-${version}-${arch}.${ext}"
  # 完全禁用代码签名（开发环境/无证书）
  signAndEditExecutable: false
  # 不强制要求签名
  forceCodeSigning: false

# macOS 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: icons/icon-256.png
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: null
  entitlementsInherit: null
  artifactName: "${productName}-${version}-${arch}.${ext}"

# Linux 配置
linux:
  target:
    - AppImage
    - deb
    - rpm
  icon: icons/icon-256.png
  category: Utility
  artifactName: "${productName}-${version}-${arch}.${ext}"

# NSIS 安装程序配置（Windows）
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DeepSeek Cowork

# DMG 配置（macOS）
dmg:
  title: "${productName} ${version}"
  icon: icons/icon-256.png
  contents:
    - x: 410
      y: 150
      type: "link"
      path: "/Applications"
    - x: 130
      y: 150
      type: "file"

# 压缩配置
compression: normal

# sql.js 是纯 JavaScript/WASM 实现，无需原生编译
npmRebuild: false

# ASAR 配置
# 确保 server 和 lib 目录可以被正确访问
# 注意：asar 中的文件可以通过 require() 和 fs.readFileSync() 访问
# 但如果需要执行二进制文件，需要 unpack
asar: true
asarUnpack:
  # sql.js WASM 文件 - 需要解压才能正常加载
  - "**/sql.js/dist/sql-wasm.wasm"
  # happy-cli 运行时入口与二进制工具 - 需要解压供外部 Node.js 执行
  - "lib/happy-cli/bin/**/*"
  - "lib/happy-cli/dist/**/*"
  - "lib/happy-cli/tools/**/*"
  # libsodium WASM 文件 - 加密功能需要
  - "node_modules/libsodium-wrappers/**/*"
  - "node_modules/libsodium/**/*"

# 发布配置 - 自动更新使用 GitHub Releases
publish:
  provider: github
  owner: imjszhang
  repo: deepseek-cowork
  releaseType: release
